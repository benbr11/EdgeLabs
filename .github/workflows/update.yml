name: Update predictions

on:
  schedule:
    - cron: "0 8 * * *"    # 08:00 UTC daily
    - cron: "0 20 * * *"   # 20:00 UTC daily
  workflow_dispatch: {}     # lets you press "Run workflow" anytime
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build SOCCER predictions
        run: |
          python build_context.py
          python build_ratings.py --refresh
          python build_player_intl.py
          python export_web.py
      - name: Build NHL predictions (self-updating; auto-rolls season, daily games/shots)
        continue-on-error: true
        run: |
          python build_nhl_xg.py
          python build_nhl.py
          python nhl_export.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
