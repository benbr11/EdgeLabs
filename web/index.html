<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b3d2e">
<title>World Cup 2026 Predictor</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0a0e14; --panel:#121823; --panel2:#1a2230; --line:#26303f;
  --txt:#e6edf3; --mut:#8b98a9; --grn:#2ecc71; --grnd:#0b3d2e;
  --red:#e74c3c; --amb:#f1c40f; --blue:#4aa3ff; --accent:#2ecc71;
}
*{box-sizing:border-box} html,body{margin:0}
body{background:var(--bg);color:var(--txt);font:15px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;padding-bottom:60px}
header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#0b3d2e,#0a2a20);
  padding:14px 16px;border-bottom:1px solid var(--line)}
header h1{margin:0;font-size:18px;letter-spacing:.3px} header .sub{color:#a9e7c6;font-size:12px;margin-top:2px}
nav{display:flex;gap:4px;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--line);
  position:sticky;top:57px;z-index:4}
nav button{flex:1 0 auto;background:none;border:none;color:var(--mut);padding:12px 14px;font-size:13px;
  font-weight:600;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
nav button.on{color:var(--txt);border-bottom-color:var(--accent)}
main{max-width:760px;margin:0 auto;padding:16px}
section{display:none} section.on{display:block}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
select,input{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:10px;
  padding:10px;font-size:15px;width:100%}
label{font-size:12px;color:var(--mut);display:block;margin:0 0 4px}
.vs{color:var(--mut);font-weight:700;padding:0 4px}
.btn{background:var(--accent);color:#062014;border:none;border-radius:10px;padding:12px 16px;font-weight:700;
  font-size:15px;cursor:pointer;width:100%;margin-top:4px}
.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
.note{font-size:12.5px;color:var(--mut);margin:8px 0}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px}
.tag.clinch{background:#10371f;color:#7ee2a8} .tag.elim{background:#3a1410;color:#ff9b8a}
.tag.live{background:#102a45;color:#8cc6ff} .tag.ko{background:#3a2e10;color:#ffe08a}
.probbar{display:flex;height:30px;border-radius:8px;overflow:hidden;margin:10px 0;font-size:12px;font-weight:700}
.probbar>div{display:flex;align-items:center;justify-content:center;color:#06140c;min-width:0;white-space:nowrap}
.sA{background:var(--grn)} .sD{background:#5b6878;color:#fff} .sB{background:var(--blue)}
.big{display:flex;justify-content:space-around;text-align:center;margin:6px 0}
.big .n{font-size:30px;font-weight:800} .big .l{font-size:12px;color:var(--mut)}
.xg{font-size:13px;color:var(--mut);text-align:center;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:7px 6px;text-align:right;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
th{color:var(--mut);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
.scoreline{display:flex;justify-content:space-between;padding:6px 2px;border-bottom:1px solid var(--line);font-size:14px}
.scoreline:last-child{border:none} .scoreline .p{color:var(--accent);font-weight:700}
details{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
summary{cursor:pointer;color:var(--accent);font-size:13px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.mini{font-size:12px;color:var(--mut)}
.slate-item,.gteam{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
.slate-item:last-child{border:none}
.pill{font-size:12px;color:var(--mut)} .win{color:var(--grn);font-weight:700}
.edge{color:var(--grn);font-weight:700} .neg{color:var(--mut)}
h3{margin:2px 0 10px;font-size:15px} h4{margin:14px 0 6px;font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.foot{color:var(--mut);font-size:11.5px;text-align:center;padding:18px}
.champ{display:flex;justify-content:space-between;padding:7px 2px;border-bottom:1px solid var(--line)}
.bar{height:7px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:4px}
.bar>i{display:block;height:100%;background:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>⚽ World Cup 2026 Predictor</h1>
  <div class="sub" id="subtitle">loading…</div>
</header>
<nav>
  <button data-tab="predict" class="on">Predict</button>
  <button data-tab="groups">Groups</button>
  <button data-tab="slate">Fixtures</button>
  <button data-tab="bracket">Title odds</button>
</nav>
<main>
  <section id="predict" class="on"></section>
  <section id="groups"></section>
  <section id="slate"></section>
  <section id="bracket"></section>
</main>
<div class="foot" id="foot"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
